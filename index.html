<!DOCTYPE html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Simalee_ · управление</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
:root{--bg:#e9ecf1;--ink:#3b4350;--dim:#8b94a3;--mint:#57c79c;--mint2:#3eb98c;--blue:#5b8def;
--sh:#c5cad3;--lt:#ffffff;--rd:#e8788a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh}
.wrap{max-width:520px;margin:auto;padding:20px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.brand{font-size:22px;font-weight:800;letter-spacing:.5px}.brand b{color:var(--mint2)}
.sub{color:var(--dim);font-size:12px;letter-spacing:.5px}
.pill{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;padding:9px 15px;border-radius:30px;background:var(--bg);box-shadow:inset 3px 3px 7px var(--sh),inset -3px -3px 7px var(--lt)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--rd)}.dot.on{background:var(--mint)}
.card{background:var(--bg);border-radius:26px;padding:20px;margin:16px 0;box-shadow:9px 9px 20px var(--sh),-9px -9px 20px var(--lt)}
.lbl{color:var(--dim);font-size:13px;font-weight:600;margin:14px 0 8px}
.row{display:flex;gap:12px}.row>*{flex:1}
button{font-size:15px;font-weight:700;padding:15px;border:0;border-radius:18px;color:var(--ink);cursor:pointer;background:var(--bg);
box-shadow:5px 5px 12px var(--sh),-5px -5px 12px var(--lt);transition:.12s}
button:active{box-shadow:inset 4px 4px 9px var(--sh),inset -4px -4px 9px var(--lt)}
.b-mint{background:linear-gradient(145deg,#5fd0a4,#49b88a);color:#fff;box-shadow:6px 6px 14px #b9d7cd,-5px -5px 12px #fff}
.b-blue{background:linear-gradient(145deg,#6c98f2,#4f7fe0);color:#fff;box-shadow:6px 6px 14px #c3d2ee,-5px -5px 12px #fff}
.b-rd{background:linear-gradient(145deg,#ef8294,#e15f74);color:#fff;box-shadow:6px 6px 14px #efd0d6,-5px -5px 12px #fff}
input{font-size:15px;padding:14px;border-radius:16px;width:100%;color:var(--ink);background:var(--bg);border:0;text-align:center;
box-shadow:inset 4px 4px 9px var(--sh),inset -4px -4px 9px var(--lt)}
.big{font-size:40px;font-weight:800;transition:.3s}.big.on{color:var(--mint2)}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:16px}
.sw{width:116px;height:58px;border-radius:32px;background:var(--bg);box-shadow:inset 5px 5px 10px var(--sh),inset -5px -5px 10px var(--lt);position:relative;cursor:pointer;transition:.3s}
.sw.on{background:linear-gradient(145deg,#5fd0a4,#49b88a);box-shadow:inset 2px 2px 6px #3ea886,inset -2px -2px 6px #6fe0b4}
.knob{position:absolute;top:5px;left:5px;width:48px;height:48px;border-radius:50%;background:#fff;transition:.3s;box-shadow:3px 3px 8px var(--sh)}
.sw.on .knob{left:63px}
.deg{font-size:36px;font-weight:800;color:var(--mint2)}
.gwrap{display:flex;align-items:center;gap:18px}
svg .needle{transition:transform .35s cubic-bezier(.2,.9,.2,1);transform-origin:80px 80px}
.foot{text-align:center;color:var(--dim);font-size:12px;margin-top:18px}
</style></head><body><div class="wrap">

<div class="top"><div><div class="brand">Simalee<b>_</b></div><div class="sub">умное управление</div></div>
<div class="pill"><span class="dot" id="dot"></span><span id="st">…</span></div></div>

<div class="card" id="rcard"><div class="toggle">
<svg width="168" height="116" viewBox="0 0 228 150">
  <rect x="6" y="30" width="216" height="112" rx="12" fill="#2a4f86"/>
  <rect x="150" y="38" width="64" height="44" rx="6" fill="#3a63a8"/>
  <circle cx="168" cy="60" r="6.5" fill="#dfe6f0"/><circle cx="196" cy="60" r="6.5" fill="#dfe6f0"/>
  <rect x="60" y="18" width="96" height="92" rx="9" fill="#3f7ce0"/>
  <rect x="60" y="18" width="96" height="32" rx="9" fill="#fff" opacity=".18"/>
  <text x="108" y="60" fill="#eef4ff" font-size="12" text-anchor="middle" font-weight="800">JQC-3FF</text>
  <text x="108" y="78" fill="#cfe0ff" font-size="9" text-anchor="middle">5VDC · 10A</text>
  <circle id="ledG" cx="32" cy="64" r="9" fill="#1d3d2a"/>
  <circle id="ledR" cx="32" cy="96" r="9" fill="#ff5a5a"/>
</svg>
<div style="text-align:right"><div class="lbl" style="margin:0">Реле</div>
<div class="big" id="rtx" style="color:#8b94a3">—</div>
<div class="sw" id="sw" onclick="toggleRelay()" style="margin-left:auto"><div class="knob"></div></div></div></div>
<div class="lbl">Импульс — включить на N секунд</div>
<div class="row"><input id="pul" type="number" value="10"><button class="b-mint" onclick="pulse()">Импульс</button></div></div>

<div class="card"><div class="lbl" style="margin-top:0">Мотор</div>
<div class="gwrap"><svg width="160" height="160" viewBox="0 0 160 160">
<circle cx="80" cy="80" r="68" fill="none" stroke="#d6dae1" stroke-width="12"/>
<circle cx="80" cy="80" r="68" fill="none" stroke="#57c79c" stroke-width="4" stroke-dasharray="6 16" opacity=".7"/>
<g id="ticks"></g>
<line class="needle" id="ndl" x1="80" y1="80" x2="80" y2="24" stroke="#3eb98c" stroke-width="6" stroke-linecap="round"/>
<circle cx="80" cy="80" r="9" fill="#3eb98c"/></svg>
<div><div class="deg"><span id="deg">0</span>°</div><div class="sub">положение</div>
<div class="row" style="margin-top:10px"><button onclick="jog(-90)">◀ 90</button><button onclick="jog(90)">90 ▶</button></div></div></div>
<div class="lbl">По углу (°, + вправо / − влево)</div>
<div class="row"><input id="ang" type="number" value="90"><button class="b-blue" onclick="byAngle()">Повернуть</button></div>
<div class="lbl">По времени (сек, знак = сторона)</div>
<div class="row"><input id="sec" type="number" value="3"><button class="b-blue" onclick="byTime()">Крутить</button></div></div>

<div class="foot">Сделано <b>Simalee_</b> · ESP32 · MQTT</div>
</div>
<script>
let tk='';for(let i=0;i<24;i++){let a=i*15*Math.PI/180,l=i%6==0?12:7;tk+=`<line x1="${80+Math.sin(a)*64}" y1="${80-Math.cos(a)*64}" x2="${80+Math.sin(a)*(64-l)}" y2="${80-Math.cos(a)*(64-l)}" stroke="#c2c8d0" stroke-width="2"/>`;}
document.getElementById('ticks').innerHTML=tk;
const TOPIC='simalee_ctrl_x7k9',CMD=TOPIC+'/cmd',STAT=TOPIC+'/status',SPR=2048;
let pos=0,relay=false,ac;
function beep(f,d){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f;g.gain.value=.07;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+(d||.08));o.stop(ac.currentTime+(d||.08));}catch(e){}}
const client=mqtt.connect('wss://broker.emqx.io:8084/mqtt',{clientId:'sim-'+Math.random().toString(16).slice(2,8),keepalive:30});
client.on('connect',()=>{setC(true);client.subscribe(STAT);});client.on('reconnect',()=>setC(false));client.on('close',()=>setC(false));client.on('error',()=>setC(false));
client.on('message',(t,m)=>{try{const d=JSON.parse(m.toString());if('relay'in d){const nr=!!d.relay;if(nr!==relay){relay=nr;paintRelay();beep(nr?1320:660,.16);}}}catch(e){}});
function setC(ok){document.getElementById('dot').className='dot'+(ok?' on':'');document.getElementById('st').textContent=ok?'на связи':'нет связи';}
function pub(t,v){client.publish(CMD,JSON.stringify({t:t,v:v}));}
function paintRelay(){document.getElementById('sw').className='sw'+(relay?' on':'');
document.getElementById('ledG').setAttribute('fill',relay?'#57f0a8':'#1d3d2a');
const rt=document.getElementById('rtx');rt.className='big'+(relay?' on':'');rt.textContent=relay?'ВКЛ':'ВЫКЛ';rt.style.color=relay?'':'#8b94a3';}
function toggleRelay(){relay=!relay;beep(relay?1500:760);pub(2,relay?1:0);paintRelay();}
function pulse(){const s=+document.getElementById('pul').value||5;beep(980,.1);pub(2,1);relay=true;paintRelay();setTimeout(()=>{pub(2,0);relay=false;paintRelay();},s*1000);}
function setPos(p){pos=((p%360)+360)%360;document.getElementById('deg').textContent=Math.round(pos);document.getElementById('ndl').setAttribute('transform','rotate('+pos+' 80 80)');}
function jog(d){beep(620);pub(3,Math.round(d*SPR/360));setPos(pos+d);}
function byAngle(){beep(640);const d=+document.getElementById('ang').value||0;pub(3,Math.round(d*SPR/360));setPos(pos+d);}
function byTime(){beep(560);const s=+document.getElementById('sec').value||0;pub(4,Math.round(Math.abs(s)*1000)*(s>=0?1:-1));setPos(pos+(s>=0?90:-90));}
paintRelay();setPos(0);
</script></body></html>
